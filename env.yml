name: transformer_proj
channels:
  - pytorch
  - nvidia
  - conda-forge
  - defaults
dependencies:
  # basic
  - python=3.11
  - numpy=1.24
  - jupyter=1.0
  - ipython=8.12
  - matplotlib=3.7
  - scipy=1.10.1
  - networkx=3.1
  - pip=24.2
  - pandas=2.0
  - seaborn=0.13

  # deep learning
  - pip: # critical : a double indentation is required to install pip packages below !
      - torch --index-url https://download.pytorch.org/whl/cu130
      - plotly==5.22.0 # interactive 3d visualization
      - scikit-learn==1.3.2 # tsne
      - umap-learn==0.5.6 # data visualization