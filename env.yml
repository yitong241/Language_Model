name: transformer_proj
channels:
  - pytorch # DL
  - nvidia # CUDA runtime
  - conda-forge # numpy/scipy
  - defaults
dependencies:
  # basic
  - python=3.12
  - numpy=2.4
  - jupyter=1.0
  - ipython=9.11
  - matplotlib=3.10
  - scipy=1.17
  - networkx=3.6
  - pip=24.2
  - pandas=3.0
  - seaborn=0.13

  # deep learning (GPU-accelerated)
  - pytorch=2.10.0 # DL
  - torchvision=0.25 # CV
  - pytorch-cuda=12.4 # CUDA support
  - pip: # critical : a double indentation is required to install pip packages below !
    - gymnasium==1.2.3 # RL (successor to gym)